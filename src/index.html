<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1C110A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Nameboard</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* ----- Shared screen base ----- */
    .screen {
      display: none;
      width: 100%; height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background-color .2s, color .2s;
    }
    .screen.active { display: flex; }

    /* ----- Display mode ----- */
    #display-screen {
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    #name-display {
      font-weight: 700;
      text-align: center;
      word-break: break-word;
      padding: 5vw;
      max-width: 100%;
      max-height: 100%;
      outline: none;
    }

    /* ----- Toolbar (display mode) ----- */
    #toolbar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: rgba(0,0,0,0.25);
      opacity: 1;
      transition: opacity .3s;
    }
    #toolbar.hidden { opacity: 0; pointer-events: none; }

    .theme-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      cursor: pointer;
      transition: transform .15s;
    }
    .theme-btn:hover, .theme-btn:focus { transform: scale(1.2); }
    .theme-btn.active { border-color: #fff; border-width: 3px; }

    .toolbar-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 20px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .toolbar-btn:hover { color: #fff; background: rgba(255,255,255,0.15); }

    /* ----- Input / Edit mode ----- */
    #input-screen, #edit-screen {
      background: #1C110A; color: #fff;
      gap: 24px;
      padding: 24px;
      overflow-y: auto;
    }

    .form-container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .form-container h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .form-container .hint {
      font-size: 0.875rem;
      color: #C49A6C;
      text-align: center;
    }

    .form-container label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #A08060;
      align-self: flex-start;
    }

    .form-container form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-container input[type="text"] {
      width: 100%;
      font-size: 1.25rem;
      padding: 14px 18px;
      border: 1.5px solid #4A362A;
      border-radius: 10px;
      background: #2D1C13;
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-container input[type="text"]:focus {
      border-color: #C49A6C;
      box-shadow: 0 0 0 3px rgba(196,154,108,0.15);
    }
    .form-container input[type="text"]::placeholder { color: #6B5040; }

    .form-container button[type="submit"] {
      width: 100%;
      font-size: 1.125rem;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #fff;
      color: #1C110A;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .form-container button[type="submit"]:hover { background: #E8D5C0; }

    .theme-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .recent-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }
    .recent-list button {
      background: #2D1C13;
      border: 1px solid #3E2D21;
      color: #D4C4B0;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      font-size: 1rem;
      transition: background .15s;
    }
    .recent-list button:hover { background: #3E2D21; color: #fff; }

    .copy-link-btn {
      background: none;
      border: 1px solid #4A362A;
      color: #A08060;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: border-color .15s, color .15s;
    }
    .copy-link-btn:hover { border-color: #C49A6C; color: #fff; }

    /* ----- Install banner ----- */
    #install-banner {
      display: none;
      width: 100%;
      max-width: 480px;
      padding: 10px 16px;
      background: #2D1C13;
      border: 1px solid #3E2D21;
      border-radius: 8px;
      text-align: center;
      font-size: 0.875rem;
      cursor: pointer;
      color: #C49A6C;
    }
    #install-banner:hover { background: #3E2D21; }

    /* ----- Toast notification ----- */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.95);
      color: #111;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
      z-index: 100;
      text-align: center;
      white-space: nowrap;
    }
    #toast.visible { opacity: 1; }

    /* ----- QR code ----- */
    #qr-btn-display { display: none; }
    .qr-ready #qr-btn-display { display: inline-block; }

    .qr-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .qr-overlay.visible { display: flex; }

    .qr-card {
      background: #fff;
      padding: 24px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .qr-card svg { display: block; width: 220px; height: 220px; }
    .qr-card-label { color: #333; font-size: 0.875rem; font-weight: 500; }

    .qr-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qr-ready .qr-section { display: flex; }
    .qr-section .qr-box {
      background: #fff;
      padding: 12px;
      border-radius: 12px;
      line-height: 0;
    }
    .qr-section .qr-box svg { display: block; width: 160px; height: 160px; }
    .qr-section .qr-label { font-size: 0.8rem; color: #A08060; }

    @media (orientation: landscape) {
      #name-display { padding: 3vh 5vw; }
    }
  </style>
</head>
<body>

  <div id="toast"></div>

  <!-- ===== DISPLAY MODE ===== -->
  <div id="display-screen" class="screen">
    <div id="name-display" role="heading" aria-level="1" tabindex="-1"></div>
    <div id="toolbar">
      <div id="theme-picker-display" class="theme-row"></div>
      <button class="toolbar-btn" id="copy-btn-display" title="Copy link">&#128279;</button>
      <button class="toolbar-btn" id="qr-btn-display" title="QR code"><svg width="18" height="18" viewBox="0 0 7 7" fill="currentColor"><rect x="0" y="0" width="3" height="3"/><rect x="4" y="0" width="3" height="3"/><rect x="0" y="4" width="3" height="3"/><rect x="5" y="5" width="2" height="2"/></svg></button>
      <button class="toolbar-btn" id="edit-btn" title="Edit name">&#9998;</button>
    </div>
    <div id="qr-overlay" class="qr-overlay">
      <div class="qr-card">
        <div id="qr-display"></div>
        <span class="qr-card-label">Scan to open on another device</span>
      </div>
    </div>
  </div>

  <!-- ===== INPUT MODE ===== -->
  <div id="input-screen" class="screen">
    <div class="form-container">
      <h1>Nameboard</h1>
      <p class="hint">Type a name, then turn your phone sideways</p>
      <label for="name-input">Name</label>
      <form id="input-form">
        <input type="text" id="name-input" autocapitalize="words" autocomplete="off" spellcheck="false" placeholder="e.g. John Smith">
        <button type="submit">Show</button>
      </form>
      <div id="theme-picker-input" class="theme-row"></div>
      <div id="install-banner">Add to Home Screen for offline use</div>
      <div id="recent-input" class="recent-list"></div>
    </div>
  </div>

  <!-- ===== EDIT MODE ===== -->
  <div id="edit-screen" class="screen">
    <div class="form-container">
      <h1>Edit Name</h1>
      <p class="hint">Rotate sideways to display</p>
      <label for="edit-input">Name</label>
      <form id="edit-form">
        <input type="text" id="edit-input" autocapitalize="words" autocomplete="off" spellcheck="false">
        <button type="submit">Show</button>
      </form>
      <div id="theme-picker-edit" class="theme-row"></div>
      <button class="copy-link-btn" id="copy-btn-edit">&#128279; Copy Link</button>
      <div class="qr-section">
        <div class="qr-box"><div id="qr-edit"></div></div>
        <span class="qr-label">Scan to open on another device</span>
      </div>
      <div id="recent-edit" class="recent-list"></div>
    </div>
  </div>

  <script type="module">
    import {
      parseHash, buildHash, THEMES, resolveTheme, saveTheme,
      getMode, getOrientation, fitText,
      requestWakeLock, releaseWakeLock,
      enterFullscreen, exitFullscreen,
      copyToClipboard, getRecentNames, addRecentName, debounce,
    } from './lib.js';

    // ----- DOM refs -----
    const displayScreen = document.getElementById('display-screen');
    const inputScreen   = document.getElementById('input-screen');
    const editScreen    = document.getElementById('edit-screen');
    const nameDisplay   = document.getElementById('name-display');
    const toolbar       = document.getElementById('toolbar');
    const toast         = document.getElementById('toast');
    const inputForm     = document.getElementById('input-form');
    const nameInput     = document.getElementById('name-input');
    const editForm      = document.getElementById('edit-form');
    const editInput     = document.getElementById('edit-input');
    const editBtn       = document.getElementById('edit-btn');
    const copyBtnDisp   = document.getElementById('copy-btn-display');
    const copyBtnEdit   = document.getElementById('copy-btn-edit');
    const installBanner = document.getElementById('install-banner');

    const qrOverlay    = document.getElementById('qr-overlay');
    const qrBtnDisplay = document.getElementById('qr-btn-display');
    const qrDisplayEl  = document.getElementById('qr-display');
    const qrEditEl     = document.getElementById('qr-edit');

    let currentTheme = 'classic';
    let hideToolbarTimer = null;
    let toastTimer = null;
    let forceDisplay = false;
    let qrcodeFactory = null;

    // ----- Toast -----
    function showToast(msg, durationMs = 2500) {
      toast.textContent = msg;
      toast.classList.add('visible');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('visible'), durationMs);
    }

    // ----- QR code -----
    function updateQR(container) {
      if (!qrcodeFactory) return;
      const qr = qrcodeFactory(0, 'M');
      qr.addData(location.href);
      qr.make();
      container.innerHTML = qr.createSvgTag({ scalable: true, margin: 2 });
    }

    // ----- Theme pickers -----
    function buildThemePickers() {
      ['theme-picker-display', 'theme-picker-input', 'theme-picker-edit'].forEach((id) => {
        const container = document.getElementById(id);
        container.innerHTML = '';
        for (const [slug, t] of Object.entries(THEMES)) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'theme-btn' + (slug === currentTheme ? ' active' : '');
          btn.style.background = t.bg;
          btn.style.borderColor = t.text;
          btn.setAttribute('aria-label', t.name + ' theme');
          btn.dataset.theme = slug;
          btn.addEventListener('click', () => selectTheme(slug));
          container.appendChild(btn);
        }
      });
    }

    function selectTheme(slug) {
      if (!THEMES[slug]) return;
      currentTheme = slug;
      saveTheme(slug);
      const { name } = parseHash(location.hash);
      if (name) location.hash = buildHash(name, slug);
      applyTheme();
      buildThemePickers();
    }

    function applyTheme() {
      const t = THEMES[currentTheme] || THEMES.classic;
      displayScreen.style.backgroundColor = t.bg;
      displayScreen.style.color = t.text;
      nameDisplay.style.textShadow = `0 0 20px ${t.text}40`;
    }

    // ----- Recent names -----
    function renderRecent(containerId, handler) {
      const el = document.getElementById(containerId);
      const names = getRecentNames();
      el.innerHTML = '';
      names.forEach((n) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = n;
        btn.addEventListener('click', () => handler(n));
        el.appendChild(btn);
      });
    }

    // ----- Toolbar: tap-to-toggle with auto-hide -----
    function showToolbar() {
      toolbar.classList.remove('hidden');
      clearTimeout(hideToolbarTimer);
      hideToolbarTimer = setTimeout(() => toolbar.classList.add('hidden'), 3000);
    }

    function hideToolbar() {
      toolbar.classList.add('hidden');
      clearTimeout(hideToolbarTimer);
    }

    function toggleToolbar(e) {
      if (e.target.closest('#toolbar')) return;
      if (toolbar.classList.contains('hidden')) {
        showToolbar();
      } else {
        hideToolbar();
      }
    }

    displayScreen.addEventListener('click', toggleToolbar);
    displayScreen.addEventListener('mousemove', () => {
      if (toolbar.classList.contains('hidden')) return;
      clearTimeout(hideToolbarTimer);
      hideToolbarTimer = setTimeout(() => toolbar.classList.add('hidden'), 3000);
    });

    // ----- QR overlay (display mode) -----
    qrBtnDisplay.addEventListener('click', (e) => {
      e.stopPropagation();
      updateQR(qrDisplayEl);
      qrOverlay.classList.add('visible');
    });
    qrOverlay.addEventListener('click', (e) => {
      e.stopPropagation();
      qrOverlay.classList.remove('visible');
    });

    // ----- Show display (forced, bypasses orientation check) -----
    function showDisplay(name) {
      forceDisplay = true;
      currentTheme = resolveTheme(parseHash(location.hash).theme);

      displayScreen.classList.add('active');
      inputScreen.classList.remove('active');
      editScreen.classList.remove('active');

      nameDisplay.textContent = name;
      applyTheme();
      fitText(nameDisplay, displayScreen);
      nameDisplay.focus();
      requestWakeLock();
      enterFullscreen();
      hideToolbar();

      if (getOrientation() === 'portrait') {
        showToast('Rotate sideways for best view');
      }
    }

    // ----- Core render (orientation-driven) -----
    function render() {
      const hashState = parseHash(location.hash);
      const orientation = getOrientation();

      if (forceDisplay && hashState.name) {
        if (orientation === 'landscape') forceDisplay = false;
        nameDisplay.textContent = hashState.name;
        currentTheme = resolveTheme(hashState.theme);
        applyTheme();
        fitText(nameDisplay, displayScreen);
        return;
      }
      forceDisplay = false;

      const mode = getMode(hashState, orientation);
      currentTheme = resolveTheme(hashState.theme);

      displayScreen.classList.toggle('active', mode === 'display');
      inputScreen.classList.toggle('active', mode === 'input');
      editScreen.classList.toggle('active', mode === 'edit');
      qrOverlay.classList.remove('visible');

      if (mode === 'display') {
        nameDisplay.textContent = hashState.name;
        applyTheme();
        fitText(nameDisplay, displayScreen);
        nameDisplay.focus();
        requestWakeLock();
        hideToolbar();
      } else {
        releaseWakeLock();
        exitFullscreen();
      }

      if (mode === 'input') {
        renderRecent('recent-input', (n) => { nameInput.value = n; });
      }

      if (mode === 'edit') {
        editInput.value = hashState.name || '';
        renderRecent('recent-edit', (n) => { editInput.value = n; });
        updateQR(qrEditEl);
      }

      buildThemePickers();
    }

    // ----- Form submissions: always force display mode -----
    inputForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = nameInput.value.trim();
      if (!name) return;
      addRecentName(name);
      location.hash = buildHash(name, currentTheme);
      showDisplay(name);
    });

    editForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const name = editInput.value.trim();
      if (!name) return;
      addRecentName(name);
      location.hash = buildHash(name, currentTheme);
      showDisplay(name);
    });

    // ----- Edit button (desktop / toolbar) -----
    editBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      forceDisplay = false;
      const hashState = parseHash(location.hash);
      editScreen.classList.add('active');
      displayScreen.classList.remove('active');
      editInput.value = hashState.name || '';
      renderRecent('recent-edit', (n) => { editInput.value = n; });
      buildThemePickers();
      updateQR(qrEditEl);
      releaseWakeLock();
      exitFullscreen();
    });

    // ----- Copy buttons -----
    async function handleCopy(btn) {
      await copyToClipboard(location.href);
      const original = btn.innerHTML;
      btn.textContent = 'Copied!';
      setTimeout(() => { btn.innerHTML = original; }, 1500);
    }
    copyBtnDisp.addEventListener('click', (e) => { e.stopPropagation(); handleCopy(copyBtnDisp); });
    copyBtnEdit.addEventListener('click', () => handleCopy(copyBtnEdit));

    // ----- Orientation / hash change -----
    window.addEventListener('hashchange', () => render());

    if (screen.orientation) {
      screen.orientation.addEventListener('change', () => render());
    }
    window.matchMedia('(orientation: portrait)').addEventListener('change', () => render());
    window.addEventListener('resize', debounce(() => {
      if (displayScreen.classList.contains('active')) {
        fitText(nameDisplay, displayScreen);
      }
    }, 100));

    // ----- Visibility change (re-acquire wake lock) -----
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && displayScreen.classList.contains('active')) {
        requestWakeLock();
      }
    });

    // ----- Install prompt -----
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBanner.style.display = 'block';
    });
    installBanner.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBanner.style.display = 'none';
    });

    // ----- Service Worker registration -----
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // ----- QR library (async, gracefully degrades offline) -----
    import('https://esm.sh/qrcode-generator@1.4.4').then((mod) => {
      qrcodeFactory = mod.default;
      document.body.classList.add('qr-ready');
      render();
    }).catch(() => {});

    // ----- Initial render -----
    render();
  </script>
</body>
</html>
